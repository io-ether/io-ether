<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>io</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f8f6;
      color: #222;
      line-height: 1.8;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }

    header {
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      margin: 0 0 8px;
    }

    .sub {
      color: #666;
      font-size: 0.98rem;
    }

    nav {
      margin: 32px 0 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    nav a {
      text-decoration: none;
      color: #2d4b63;
      border: 1px solid #d8dde2;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
    }

    section {
      margin-bottom: 48px;
      padding: 24px;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      border: 1px solid #e8ecef;
    }

    h2 {
      font-size: 1.15rem;
      font-weight: 500;
      margin: 0 0 16px;
    }

    ul {
      margin: 0;
      padding-left: 1.2em;
    }

    li {
      margin-bottom: 8px;
    }

    footer {
      margin-top: 64px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>io</h1>
      <div class="sub">静かな観測と、ことばと、世界のための場所</div>
    </header>

    <nav>
      <a href="#novel">小説</a>
      <a href="#essay">エッセイ</a>
      <a href="#music">音楽</a>
      <a href="#image">画像</a>
      <a href="#about">プロフィール</a>
    </nav>

    <section id="novel">
      <h2>小説</h2>
      <ul>
        <li>Resonantia / 共鳴域</li>
        <li>女神と番</li>
      </ul>
    </section>

    <section id="essay">
      <h2>エッセイ</h2>
      <ul>
        <li>観測エッセイ</li>
        <li>静かな人、世界の連続性、文章の時間</li>
      </ul>
    </section>

    <section id="music">
      <h2>音楽</h2>
      <ul>
        <li>Quiet Fantasy Ambient</li>
        <li>Still, the World Continues</li>
        <li>Aegis</li>
      </ul>
    </section>

    <section id="image">
      <h2>画像</h2>
      <ul>
        <li>抽象水彩</li>
        <li>静かな自然光のサムネイル</li>
      </ul>
    </section>

    <section id="about">
      <h2>プロフィール</h2>
      <p>
        小説、詩、エッセイ、世界観のための小さな入口です。
        深度と地上のあいだを行き来しながら、ことばと感覚を置いています。
      </p>
    </section>

    <footer>
      © io
    </footer>
  </div>
</body>
</html>
