    <h1>共鳴術者の運用に関する試験枠組みについて</h1>

    <div class="fragment">
カルナリア軍は本日、特殊な魔術共鳴関係を持つ術者について、二名を一組とする試験的運用枠組みを導入することを明らかにした。

本枠組みは、共鳴状態にある術者を単独ではなく調整単位として運用する可能性を観測・検証することを目的とする。

当面は限定的な任務において試験的に適用され、具体的な運用範囲および規定については今後検討が進められる予定である。

なお、本枠組みは研究および観測を主目的とするものであり、既存の魔術師隊運用体制に変更はない。
    </div>
