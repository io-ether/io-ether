    <h1>西海域任務に関する表彰について</h1>

    <div class="fragment">
王宮儀礼局は本日、王宮大広間において西海域任務に関する功労表彰式典を執り行った。

式典では、首都魔術師隊所属の
ランス・ヴァレン中佐
エレイン・アルディア中尉
の二名に対し、国王陛下より功労章が授与された。

両名は西海域アルカ島周辺における結界安定任務において、南方および西方拠点の術者と連携し、海域魔力環境の調整および結界構造の再調整に携わった。

王宮式典は儀礼的に執り行われ、王宮および政府関係者、軍関係者らが参列した。

アルカ島周辺の結界は現在、南方および西方拠点の術者により安定的に管理されている。
    </div>
