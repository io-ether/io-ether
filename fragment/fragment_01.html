    <h1>静かな均衡</h1>

    <div class="fragment">
光は、ただそこにある。
影もまた、そこにある。

紋章の下に、秩序が立ち、
遠い端に、影が立つ。

そのあいだを、
わたしは水のように通り過ぎる。

触れず、押さず、
ただ、静かに満たす。

世界は崩れていない。
ただ、違うものが並んでいるだけ。
    </div>
