    <h1>春の冷たい空気</h1>

    <div class="fragment">
今日は、少し遅く起きた。

朝は、パンと卵。
ヨーグルト。
昨日のミニトマト。

残っていた白菜のブレゼを、冷たいまま食べた。
胡椒をかけると、やはり輪郭が立つ。

昼すぎ、塩麹をもむ。
少し甘い匂い。
白くて、もっちりしている。

明日の丸パンの生地を作る。
うまくいくかは、まだわからない。

窓を開けて、少し日の光を浴びる。
春なのに、空気が冷たい。
寒の戻りかもしれない。

夕方、外に出て少し歩く。
帰って、晩ごはん。

いま、少しねむい。
今日はここまで。
もう寝よう。
    </div>
